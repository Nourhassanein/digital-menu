<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bloom Admin</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<link rel="stylesheet" href="style.css">
</head>

<body>
<div class="admin-container">

<div class="sidebar">
  <h2>🌸 Bloom</h2>
  <ul>
    <li class="active" onclick="showPage('dashboard', this)">📊 Dashboard</li>
    <li onclick="showPage('items', this)">🍽 Items</li>
    <li onclick="showPage('orders', this)">🧾 Orders</li>
    <li onclick="logout()">🚪 Logout</li>
  </ul>
</div>

<div class="main-content">

<div id="dashboardPage" class="page">
  <h2>Dashboard</h2>

  <div class="row mt-4">
    <div class="col-md-4">
      <div class="card p-3 text-center">
        <h6>Total Items</h6>
        <h2 id="totalItems">0</h2>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card p-3 text-center">
        <h6>Total Orders</h6>
        <h2 id="totalOrders">0</h2>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card p-3 text-center">
        <h6>Revenue</h6>
        <h2 id="totalRevenue">$0</h2>
      </div>
    </div>
  </div>
</div>
<div id="itemsPage" class="page" style="display:none;">
  <h2>Menu Items</h2>

  <div class="card p-4 mt-3">
    <input id="name" class="form-control mb-2" placeholder="Name">
    <input id="category" class="form-control mb-2" placeholder="Category">
    <input id="description" class="form-control mb-2" placeholder="Description">
    <input id="price" type="number" class="form-control mb-2" placeholder="Price">
    <input id="image" type="file" class="form-control mb-2">

    <button id="addBtn" class="btn btn-primary w-100">Add Item</button>
  </div>

  <div class="card p-4 mt-4">
    <table class="table">
      <thead>
        <tr>
          <th>Item</th>
          <th>Price</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="itemsTable"></tbody>
    </table>
  </div>
</div>


<div id="ordersPage" class="page" style="display:none;">
  <h2>Orders</h2>

  <div class="card p-4 mt-3">
    <table class="table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Customer</th>
          <th>Total</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="ordersTable"></tbody>
    </table>
  </div>
</div>

</div>
</div>

<script src="script.js"></script>
</body>
</html>
